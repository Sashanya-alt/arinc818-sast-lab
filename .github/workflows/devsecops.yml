name: DevSecOps Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  BUILD_DIR: build_ci
  EXE_NAME: arinc818_sim

jobs:
  # ============================================
  # JOB 1: СБОРКА
  # ============================================
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++
      
      - name: Build project
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          cd ${{ env.BUILD_DIR }}
          cmake ..
          cmake --build . --target ${{ env.EXE_NAME }}
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: ${{ env.BUILD_DIR }}/${{ env.EXE_NAME }}
          retention-days: 7

  # ============================================
  # JOB 2: SAST - Semgrep
  # ============================================
  sast:
    name: 🔍 SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Semgrep
        continue-on-error: true
        run: |
          pip install semgrep
          semgrep --config auto --lang cpp --json -o semgrep.json src/ include/ || true
      
      - name: Upload SAST report
        uses: actions/upload-artifact@v4
        with:
          name: sast-report
          path: semgrep.json
          retention-days: 7

  # ============================================
  # JOB 3: SCA - Trivy (ИСПРАВЛЕН)
  # ============================================
  sca:
    name: 📦 SCA (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.62.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.62.0_Linux-64bit.deb
          trivy --version
      
      - name: Run Trivy (SBOM)
        run: |
          trivy fs --format cyclonedx --output sbom_ci.json . || true
      
      - name: Run Trivy (Vulnerabilities)
        run: |
          trivy fs --severity CRITICAL,HIGH --format json --output trivy_ci.json . || true
      
      - name: Upload SCA reports
        uses: actions/upload-artifact@v4
        with:
          name: sca-reports
          path: |
            sbom_ci.json
            trivy_ci.json
          retention-days: 7

  # ============================================
  # JOB 4: DAST - Valgrind
  # ============================================
  dast:
    name: 🐛 DAST (Valgrind)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: build_ci
      
      - name: Install Valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind
      
      - name: Build debug version
        run: |
          mkdir -p build_debug
          cd build_debug
          cmake .. -DCMAKE_BUILD_TYPE=Debug
          cmake --build .
      
      - name: Run Valgrind
        continue-on-error: true
        run: |
          chmod +x build_ci/${{ env.EXE_NAME }}
          valgrind --leak-check=full \
                   --error-exitcode=0 \
                   --log-file=valgrind.log \
                   --track-origins=yes \
                   ./build_ci/${{ env.EXE_NAME }} --help 2>&1 || true
      
      - name: Upload Valgrind log
        uses: actions/upload-artifact@v4
        with:
          name: dast-report
          path: valgrind.log
          retention-days: 7

  # ============================================
  # JOB 5: SECURITY GATE
  # ============================================
  security-gate:
    name: 🔒 Security Gate
    runs-on: ubuntu-latest
    needs: [sast, sca, dast]
    if: always()
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports
      
      - name: Install jq
        run: sudo apt-get install -y jq
      
      - name: Check Security Gate
        run: |
          echo "========================================="
          echo "🔒 SECURITY GATE - ARINC818 Simulator"
          echo "========================================="
          
          # Проверка SAST
          SAST_ERRORS=0
          SAST_WARNINGS=0
          if [ -f "reports/sast-report/semgrep.json" ]; then
            SAST_ERRORS=$(jq '[.results[] | select(.extra.severity=="ERROR")] | length' reports/sast-report/semgrep.json 2>/dev/null || echo "0")
            SAST_WARNINGS=$(jq '[.results[] | select(.extra.severity=="WARNING")] | length' reports/sast-report/semgrep.json 2>/dev/null || echo "0")
            echo "📊 SAST (Semgrep):"
            echo "   Ошибок ERROR: $SAST_ERRORS"
            echo "   Предупреждений: $SAST_WARNINGS"
          else
            echo "⚠️  SAST: файл отчёта не найден"
            SAST_ERRORS=0
          fi
          
          # Проверка SCA
          SCA_CRIT=0
          SCA_HIGH=0
          if [ -f "reports/sca-reports/trivy_ci.json" ]; then
            SCA_CRIT=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' reports/sca-reports/trivy_ci.json 2>/dev/null || echo "0")
            SCA_HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' reports/sca-reports/trivy_ci.json 2>/dev/null || echo "0")
            echo "📊 SCA (Trivy):"
            echo "   Критических: $SCA_CRIT"
            echo "   Высоких: $SCA_HIGH"
          else
            echo "⚠️  SCA: файл отчёта не найден"
            SCA_CRIT=0
          fi
          
          echo "========================================="
          echo "✅ SECURITY GATE ПРОЙДЕН (неблокирующий режим)"
          echo "========================================="